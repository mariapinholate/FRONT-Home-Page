<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Maluflix</title>
    <link rel="stylesheet" href="style.css">
    
</head>

<body>

<header class="header">
    <h1>MALUFLIX </h1>

    <nav class="menu">
        <a href="#">Início</a>
        <a href="#">Filmes</a>
        <a href="#">Séries</a>
        <a href="#"> Minha Lista </a>
        <a href="#"> Novidades </a>
    </nav>
</header>

<main class="principal">

    <section class="pesquisa">

    <input type="text" placeholder="Buscar...">
    <button>Buscar</button>

    </section>
    
<section class="banner">
    <img src="img/banner.png" alt=" imagem do banner do site"> 
</section>

<section class="categoria">
    <h2> Séries mais assistidas  </h2>

    <article class="card">
        <img src="img/filme1.jpg" alt="imagem do filme 1">
        <button> Adicionar a minha lista </button>
    </article>

     <article class="card">
        <img src="img/filme2.jpg" alt="imagem do filme 2 ">
    </article>

    <article class="card">
        <img src="img/filme3.webp" alt="imagem do filme 3 ">
    </article>
</section>

<section class="categoria">
    <h2> Filmes mais assistidos  </h2>

    <article class="card">
        <img src="img/serie1.png" alt= "imagem da serie 1 ">
    </article>

     <article class="card">
        <img src="img/serie2.png" alt="imagem da serie 2 ">
    </article>

    <article class="card">
        <img src="img/serie3.png" alt="imagem da serie 3">
    </article>
</section>

<section class="formulario">
    <h2> Receber Novidades </h2>
    <form>

        <input type="text" placeholder="Nome">
        <input type="email" placeholder=" Email">
        <input type="text" placeholder="Gênero Favorito ">
        <button type="submit"> Enviar </button>
    </form>
</section>

</main>

<footer class="footer">
    <p> Site Maluflix </p>
</footer>

</body>
</html>
